pluginManagement {
    repositories {
        maven { url "https://maven.fabricmc.net/" }
        maven { url "https://maven.architectury.dev/" }
        maven { url "https://files.minecraftforge.net/maven/" }
        gradlePluginPortal()
    }
    plugins {
        id 'org.jetbrains.kotlin.jvm' version '2.3.0'
        id 'com.google.devtools.ksp' version '2.3.5'
    }
}
plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

// --- Auto-Generated Settings ---
rootProject.name = 'aris-extension'

includeBuild('aris-mc') {
    dependencySubstitution {
        substitute module('me.ddayo:aris-common') using project(':common')
        substitute module('me.ddayo:aris-fabric') using project(':fabric')
        substitute module('me.ddayo:aris-neoforge') using project(':neoforge')
    }
}

include 'common'
include 'fabric'
include 'neoforge'
